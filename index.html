<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>باحث السيارات الكويتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:linear-gradient(160deg,#060810,#0d1122 55%,#0f1820);min-height:100vh;color:#e0e0e0;padding:18px 14px;direction:rtl}
.wrap{max-width:700px;margin:0 auto}
h1{font-size:22px;font-weight:900;color:#f0a500;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#555;font-size:12px;margin-bottom:22px}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:20px;margin-bottom:16px}
.lbl{font-size:11px;color:#555;margin-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
select,input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;font-family:'Cairo',sans-serif;outline:none;transition:border .2s}
select:focus,input:focus{border-color:#f0a500}
select option{background:#0d1122}
.go{width:100%;padding:14px;background:linear-gradient(90deg,#f0a500,#d97700);border:none;border-radius:12px;color:#000;font-size:16px;font-weight:900;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
.go:hover:not(:disabled){opacity:.9}
.go:disabled{opacity:.4;cursor:not-allowed}
.src-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.src-chip{font-size:12px;padding:4px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.sc{display:flex;align-items:center;gap:7px;padding:9px 12px;border-radius:12px;font-size:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);transition:all .3s}
.sc.loading{border-color:rgba(240,165,0,0.3);background:rgba(240,165,0,0.05);color:#888}
.sc.ok{border-color:rgba(80,200,120,0.4);background:rgba(80,200,120,0.08);color:#80e0a0}
.sc.no{border-color:rgba(255,255,255,0.06);color:#444}
.counter{background:rgba(240,165,0,0.07);border:1px solid rgba(240,165,0,0.2);border-radius:12px;padding:10px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.market{background:linear-gradient(135deg,rgba(240,165,0,0.1),rgba(240,165,0,0.04));border:1px solid rgba(240,165,0,0.3);border-radius:14px;padding:14px 18px;margin-bottom:14px;animation:fadeIn .4s}
.vc-row{display:flex;gap:8px;flex-wrap:wrap}
.vc{text-align:center;border-radius:10px;padding:6px 14px;min-width:60px}
.lcard{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:18px;margin-bottom:12px;transition:border-color .2s,box-shadow .2s;animation:fadeIn .4s}
.lcard:hover{border-color:rgba(240,165,0,0.3);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.lcard.deal{border-color:rgba(80,200,120,0.4)!important;box-shadow:0 0 20px rgba(80,200,120,0.1)!important}
.src-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;margin:4px 0 10px;font-size:13px;font-weight:700;animation:fadeIn .4s}
.badge{font-size:11px;padding:2px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.price{background:linear-gradient(90deg,#f0a500,#d97700);color:#000;font-weight:900;border-radius:8px;padding:3px 14px;font-size:15px;white-space:nowrap}
.ht{display:inline-block;background:rgba(240,165,0,0.12);border:1px solid rgba(240,165,0,0.25);color:#f0c040;border-radius:20px;padding:2px 10px;font-size:11px;margin:2px}
.ai-note{background:rgba(255,255,255,0.04);border-radius:8px;padding:6px 12px;margin-bottom:8px;font-size:12px;color:#aaa}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-bottom:8px}
.dt{font-size:13px;color:#aaa}
.sp{width:13px;height:13px;border:2px solid rgba(240,165,0,0.25);border-top-color:#f0a500;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:inline-block}
.pls{animation:pls 1.3s ease-in-out infinite}
.err{color:#ff7070;font-size:13px;margin-bottom:10px}
.empty{text-align:center;padding:36px;color:#444;border:1px dashed rgba(255,255,255,0.07);border-radius:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pls{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div style="text-align:center;font-size:36px;margin-bottom:4px">🇰🇼</div>
  <h1>باحث السيارات الكويتي</h1>
  <p class="sub">يبحث في جميع المصادر · يقيّم الأسعار تلقائياً · أفراد فقط</p>

  <div class="card">
    <p class="lbl" style="margin-bottom:8px">مصادر البحث</p>
    <div class="src-chips" id="srcChips"></div>

    <div class="grid2">
      <div><p class="lbl">الماركة</p>
        <select id="make" onchange="changeMake()"><option value="">-- اختر --</option></select>
      </div>
      <div><p class="lbl">الموديل</p>
        <select id="model"><option value="">-- اختر --</option></select>
      </div>
      <div><p class="lbl">سنة الصنع (اختياري)</p>
        <select id="year"><option value="">-- كل السنوات --</option></select>
      </div>
      <div><p class="lbl">المنطقة (اختياري)</p>
        <input type="text" id="area" placeholder="السالمية، الجهراء...">
      </div>
    </div>
    <div style="margin-bottom:14px">
      <p class="lbl">مواصفات إضافية (اختياري)</p>
      <input type="text" id="extra" placeholder="صبغ وكالة، بدون حوادث، أوتوماتيك...">
    </div>
    <p class="err" id="err" style="display:none"></p>
    <button class="go" id="btn" onclick="search()">🔍 ابحث في كل المصادر</button>
  </div>

  <div class="status-grid" id="statusGrid" style="display:none"></div>
  <div class="counter" id="counter" style="display:none">
    <span id="cText" style="font-weight:900;color:#f0c050;font-size:13px"></span>
    <span id="cSub" style="font-size:11px;color:#666"></span>
  </div>
  <div id="evalBox"></div>
  <div id="stream"></div>
</div>

<script>
const SRCS = [
  {id:"4sale",    lbl:"4Sale",         icon:"🛒", color:"#f0a500"},
  {id:"opensooq", lbl:"السوق المفتوح", icon:"🛒", color:"#f0a500"},
  {id:"motory",   lbl:"Motory",        icon:"🚗", color:"#f0a500"},
  {id:"instagram",lbl:"إنستقرام",      icon:"📸", color:"#e1306c"},
  {id:"twitter",  lbl:"تويتر / X",     icon:"🐦", color:"#1da1f2"},
  {id:"snapchat", lbl:"سناب شات",      icon:"👻", color:"#f9d71c"},
  {id:"tiktok",   lbl:"تيك توك",       icon:"🎵", color:"#69c9d0"},
];
const MAKES = ["تويوتا","لكزس","نيسان","هيونداي","كيا","مرسيدس","بي إم دبليو","شيفروليه","فورد","جيب","هوندا","ميتسوبيشي","إنفينيتي","كاديلاك","دودج"];
const MMAP = {
  "تويوتا":["لاند كروزر","برادو","كامري","كورولا","هايلكس","فورتشنر","راف فور","يارس"],
  "لكزس":["LX 570","LX 600","GX 460","RX 350","ES 350","IS 250","LS 500","NX 300"],
  "نيسان":["باترول","أكس تريل","ألتيما","صني","مكسيما","باثفايندر"],
  "هيونداي":["توسان","سانتافي","أكسنت","إلنترا","كريتا"],
  "كيا":["سبورتاج","سيراتو","تيلورايد","سورنتو","كارنيفال"],
  "جيب":["رانجلر","جراند شيروكي","شيروكي","جلادياتور"],
  "شيفروليه":["تاهو","سيلفرادو","سوبربان","كابتيفا","مالبو"],
  "مرسيدس":["S Class","E Class","C Class","GLE","GLS","G Class"],
  "بي إم دبليو":["X5","X6","X7","7 Series","5 Series","3 Series"],
  "فورد":["F-150","إكسبلورر","إكسبيديشن","موستانج"],
  "إنفينيتي":["QX80","QX60","QX50","Q50","Q70"],
  "دودج":["تشارجر","تشالنجر","دورانجو","رام"],
};
const VS = {
  "منخفض":{bg:"rgba(80,200,120,0.15)",br:"rgba(80,200,120,0.4)",cl:"#60e080",icon:"🟢",lbl:"سعر منخفض ✓"},
  "مناسب":{bg:"rgba(100,160,255,0.12)",br:"rgba(100,160,255,0.35)",cl:"#80aaff",icon:"🔵",lbl:"سعر مناسب"},
  "مرتفع":{bg:"rgba(255,100,80,0.12)",br:"rgba(255,100,80,0.3)",cl:"#ff8070",icon:"🔴",lbl:"سعر مرتفع"},
};

let allL=[],done=0,cq="",evalData=null;

// Init
(()=>{
  // chips
  const ch=document.getElementById("srcChips");
  SRCS.forEach(s=>{
    const el=document.createElement("span");
    el.className="src-chip";
    el.style.cssText=`background:${s.color}12;border:1px solid ${s.color}33;color:${s.color}`;
    el.textContent=`${s.icon} ${s.lbl}`;
    ch.appendChild(el);
  });
  // makes
  const mk=document.getElementById("make");
  MAKES.forEach(m=>{const o=document.createElement("option");o.value=o.textContent=m;mk.appendChild(o);});
  // years
  const yr=document.getElementById("year");
  for(let y=2025;y>=2006;y--){const o=document.createElement("option");o.value=o.textContent=y;yr.appendChild(o);}
})();

function changeMake(){
  const m=document.getElementById("make").value;
  const ms=document.getElementById("model");
  ms.innerHTML='<option value="">-- اختر --</option>';
  (MMAP[m]||[]).forEach(x=>{const o=document.createElement("option");o.value=o.textContent=x;ms.appendChild(o);});
}

function prompt(src){
  const extra=document.getElementById("extra").value.trim();
  const ft=extra?`مواصفات مطلوبة: ${extra}`:"";
  const inst={
    "4sale":`ابحث في موقع 4sale.com الكويت قسم السيارات عن "${cq}" للبيع من أفراد شخصيين فقط وليس مكاتب.`,
    "opensooq":`ابحث في موقع opensooq.com الكويت عن "${cq}" للبيع من أفراد شخصيين فقط.`,
    "motory":`ابحث في موقع motory.com الكويت عن "${cq}" للبيع من أفراد شخصيين فقط.`,
    "instagram":`ابحث في جوجل عن: site:instagram.com "${cq}" الكويت للبيع. وعن هاشتاقات #سيارات_للبيع_الكويت #q8cars. اذكر أسماء الحسابات الكويتية التي تبيع هذه السيارة من أفراد.`,
    "twitter":`ابحث في جوجل عن: site:x.com "${cq}" الكويت للبيع. وهاشتاقات #سيارات_للبيع #الكويت. اذكر أسماء الحسابات الكويتية.`,
    "snapchat":`ابحث في جوجل عن حسابات سناب شات كويتية تبيع "${cq}". ابحث: snapchat "${cq}" الكويت للبيع.`,
    "tiktok":`ابحث في جوجل عن: site:tiktok.com "${cq}" الكويت للبيع. اذكر الحسابات الكويتية.`,
  };
  return `${inst[src.id]}\n${ft}\nشروط صارمة: أفراد شخصيون فقط لا مكاتب ولا معارض، الكويت فقط، رتّب من الأحدث للأقدم.\nأجب بـ JSON فقط بدون أي نص خارجه:\n{"listings":[{"title":"وصف السيارة","price":"رقم فقط مثل 3500","priceDisplay":"3,500 د.ك","specs":"المواصفات","area":"المنطقة","postedDate":"تاريخ النشر","accountName":"اسم الحساب أو البائع","contact":"طريقة التواصل","url":"الرابط المباشر","highlights":["ميزة"],"redFlags":[]}],"summary":"ملخص"}`;
}

function pricePrompt(){
  const lines=allL.map((l,i)=>`[${i}] السعر: ${l.price||"غير محدد"} د.ك - المصدر: ${l._lbl} - المواصفات: ${l.specs||"غير محددة"}`).join("\n");
  return `أنت خبير في سوق السيارات المستعملة في الكويت. قيّم أسعار هذه الإعلانات لسيارة ${cq}:\n${lines}\nبناءً على معرفتك بأسعار السوق الكويتي، أجب بـ JSON فقط:\n{"marketAvgKWD":0,"marketNote":"","evaluations":[{"index":0,"verdict":"منخفض","diffPercent":"-15%","note":"سبب"}]}`;
}

async function callAPI(p, useSearch){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:p}]};
  if(useSearch) body.tools=[{type:"web_search_20250305",name:"web_search"}];
  try{
    const r=await fetch("/api/search",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.error) return {listings:[],summary:"خطأ: "+d.error};
    const txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const m=txt.match(/\{[\s\S]*\}/);
    return m?JSON.parse(m[0]):{listings:[],summary:txt};
  }catch(e){return {listings:[],summary:"خطأ في الاتصال: "+e.message};}
}

function setSC(id,state,cnt){
  const el=document.getElementById("sc-"+id);
  if(!el) return;
  const s=SRCS.find(x=>x.id===id);
  el.className="sc "+state;
  if(state==="loading") el.innerHTML=`<span class="sp"></span><span class="pls">${s.icon} ${s.lbl}</span>`;
  else if(state==="ok") el.innerHTML=`<span style="color:#80e0a0">✓</span> ${s.icon} ${s.lbl} <strong>(${cnt})</strong>`;
  else el.innerHTML=`<span style="color:#444">—</span> ${s.icon} ${s.lbl} <span style="font-size:11px;color:#444">لا نتائج</span>`;
}

function updateCounter(){
  document.getElementById("cText").textContent=`وجدنا ${allL.length} إعلان حتى الآن`;
  document.getElementById("cSub").textContent=`${done} من ${SRCS.length} مصادر انتهت`;
}

function appendCards(listings, src){
  const stream=document.getElementById("stream");
  if(!listings.length) return;
  const hdr=document.createElement("div");
  hdr.className="src-hdr";
  hdr.style.cssText=`background:${src.color}12;border:1px solid ${src.color}30;color:${src.color}`;
  hdr.innerHTML=`${src.icon} ${src.lbl} <span style="font-size:12px;opacity:.7;font-weight:400">— ${listings.length} إعلان</span>`;
  stream.appendChild(hdr);
  listings.forEach(l=>stream.appendChild(makeCard(l,null)));
}

function makeCard(l,ev){
  const vs=ev?VS[ev.verdict]:null;
  const isDeal=ev?.verdict==="منخفض";
  const div=document.createElement("div");
  div.className="lcard"+(isDeal?" deal":"");
  div.id="card-"+l._idx;
  const vb=vs?`<span class="badge" style="background:${vs.bg};border:1px solid ${vs.br};color:${vs.cl}">${vs.icon} ${vs.lbl}${ev.diffPercent?` ${ev.diffPercent}`:""}</span>`:`<span id="vb-${l._idx}"></span>`;
  const fire=isDeal?`<span class="badge" style="background:rgba(80,200,120,0.2);border:1px solid rgba(80,200,120,0.5);color:#40e070;font-weight:900;animation:pls 1.5s infinite">🔥 فرصة!</span>`:"";
  const note=ev?.note?`<div class="ai-note" id="note-${l._idx}">🧠 ${ev.note}</div>`:`<div id="note-${l._idx}"></div>`;
  const pr=l.priceDisplay?`<span class="price">${l.priceDisplay}</span>`:l.price?`<span class="price">${l.price} د.ك</span>`:"";
  const link=l.url&&l.url.startsWith("http")?`<a href="${l.url}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;color:${l._color||"#f0a500"};font-size:13px;text-decoration:none;font-weight:700">🔗 فتح الإعلان ←</a>`:"";
  div.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px">
          <span class="badge" style="background:${l._color||"#f0a500"}1a;border:1px solid ${l._color||"#f0a500"}44;color:${l._color||"#f0a500"}">${l._icon} ${l._lbl}</span>
          <span class="badge" style="background:rgba(80,200,120,0.1);border:1px solid rgba(80,200,120,0.25);color:#80e0a0">👤 شخصي</span>
          ${vb}${fire}
        </div>
        <p style="font-size:15px;font-weight:700;color:#e8e8e8;line-height:1.4">${l.title||"إعلان"}</p>
      </div>
      <div style="text-align:left;flex-shrink:0">${pr}${l.postedDate?`<p style="font-size:10px;color:#666;text-align:center;margin-top:4px">🕐 ${l.postedDate}</p>`:""}</div>
    </div>
    ${note}
    <div class="dg">
      ${l.specs?`<p class="dt">📋 ${l.specs}</p>`:""}
      ${l.area?`<p class="dt">📍 ${l.area}</p>`:""}
      ${l.accountName?`<p class="dt">👤 ${l.accountName}</p>`:""}
      ${l.contact?`<p class="dt">📞 ${l.contact}</p>`:""}
    </div>
    ${(l.highlights||[]).length?`<div>${l.highlights.map(h=>`<span class="ht">✓ ${h}</span>`).join("")}</div>`:""}
    ${link}`;
  return div;
}

function updateCardVerdict(l,ev){
  const vs=VS[ev.verdict];if(!vs) return;
  const card=document.getElementById("card-"+l._idx);if(!card) return;
  if(ev.verdict==="منخفض") card.classList.add("deal");
  const vb=document.getElementById("vb-"+l._idx);
  if(vb) vb.outerHTML=`<span class="badge" style="background:${vs.bg};border:1px solid ${vs.br};color:${vs.cl}">${vs.icon} ${vs.lbl}${ev.diffPercent?` ${ev.diffPercent}`:""}</span>`;
  const nb=document.getElementById("note-"+l._idx);
  if(nb&&ev.note) nb.innerHTML=`🧠 ${ev.note}`;
  if(ev.verdict==="منخفض"){
    const badges=card.querySelector("div>div>div");
    if(badges){const f=document.createElement("span");f.className="badge";f.style.cssText="background:rgba(80,200,120,0.2);border:1px solid rgba(80,200,120,0.5);color:#40e070;font-weight:900;animation:pls 1.5s infinite";f.textContent="🔥 فرصة!";badges.appendChild(f);}
  }
}

async function search(){
  const make=document.getElementById("make").value;
  const model=document.getElementById("model").value;
  const year=document.getElementById("year").value;
  const errEl=document.getElementById("err");
  if(!make||!model){errEl.textContent="⚠️ يرجى تحديد الماركة والموديل";errEl.style.display="block";return;}
  errEl.style.display="none";
  allL=[];done=0;evalData=null;cq=year?`${make} ${model} ${year}`:`${make} ${model}`;
  document.getElementById("stream").innerHTML="";
  document.getElementById("evalBox").innerHTML="";
  document.getElementById("btn").disabled=true;
  document.getElementById("btn").textContent="⏳ جارٍ البحث...";

  // Status grid
  const sg=document.getElementById("statusGrid");
  sg.style.display="grid";sg.innerHTML="";
  SRCS.forEach(s=>{
    const el=document.createElement("div");
    el.id="sc-"+s.id;el.className="sc loading";
    el.innerHTML=`<span class="sp"></span><span class="pls">${s.icon} ${s.lbl}</span>`;
    sg.appendChild(el);
  });
  document.getElementById("counter").style.display="flex";
  updateCounter();

  await Promise.all(SRCS.map(async src=>{
    const res=await callAPI(prompt(src),true);
    const idx0=allL.length;
    const wm=(res.listings||[]).map((l,i)=>({...l,_idx:idx0+i,_sid:src.id,_lbl:src.lbl,_icon:src.icon,_color:src.color}));
    allL.push(...wm);
    done++;
    setSC(src.id,wm.length>0?"ok":"no",wm.length);
    updateCounter();
    appendCards(wm,src);
  }));

  // Price eval
  document.getElementById("btn").textContent="🧠 جارٍ تقييم الأسعار...";
  const notice=document.createElement("div");
  notice.id="evalNotice";
  notice.style.cssText="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;color:#888;animation:fadeIn .4s";
  notice.innerHTML=`<span class="sp" style="width:18px;height:18px"></span><span class="pls">🧠 الذكاء الاصطناعي يقيّم الأسعار...</span>`;
  document.getElementById("evalBox").appendChild(notice);

  if(allL.length>0){
    try{evalData=await callAPI(pricePrompt(),false);}catch(e){}
  }
  document.getElementById("evalNotice")?.remove();

  if(evalData){
    (evalData.evaluations||[]).forEach(ev=>{const l=allL[ev.index];if(l)updateCardVerdict(l,ev);});
    const counts={};["منخفض","مناسب","مرتفع"].forEach(v=>{counts[v]=(evalData.evaluations||[]).filter(e=>e.verdict===v).length;});
    document.getElementById("evalBox").innerHTML=`
      <div class="market">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
          <div>
            <p style="font-size:11px;color:#888">متوسط سعر السوق الكويتي لـ ${cq}</p>
            <p style="font-size:22px;font-weight:900;color:#f0a500;margin-top:2px">${(evalData.marketAvgKWD||0).toLocaleString()} <span style="font-size:14px">د.ك</span></p>
          </div>
          <div class="vc-row">
            ${["منخفض","مناسب","مرتفع"].map(v=>{const st=VS[v];return`<div class="vc" style="background:${st.bg};border:1px solid ${st.br}"><div style="font-size:18px">${st.icon}</div><div style="font-size:11px;color:${st.cl};font-weight:700">${v}</div><div style="font-size:14px;color:#ddd;font-weight:900">${counts[v]}</div></div>`;}).join("")}
          </div>
        </div>
        ${evalData.marketNote?`<p style="margin-top:10px;font-size:12px;color:#888;border-top:1px solid rgba(255,255,255,0.07);padding-top:8px">💡 ${evalData.marketNote}</p>`:""}
      </div>`;
    const stream=document.getElementById("stream");
    stream.parentNode.insertBefore(document.getElementById("evalBox"),stream);
  }

  if(allL.length===0){
    document.getElementById("stream").innerHTML=`<div class="empty"><p style="font-size:30px">🔍</p><p style="margin-top:8px">لم يتم العثور على نتائج — جرب تغيير البحث</p></div>`;
  }

  document.getElementById("btn").disabled=false;
  document.getElementById("btn").textContent="🔍 ابحث في كل المصادر";
  updateCounter();
}
</script>
</body>
</html>
