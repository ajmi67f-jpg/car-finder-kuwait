<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مقارنة سيارات 4Sale الكويت</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --card: #1e2230;
  --border: #2a2f45;
  --accent: #f5c542;
  --text: #e8eaf0;
  --muted: #7a849a;
  --green: #3ecf8e;
  --red: #f76e6e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

header {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px 24px;
  display:flex; align-items:center; gap:12px;
}
.logo { width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px; }
header h1 { font-size:18px;font-weight:900; }
header span { font-size:12px;color:var(--muted); }

.search-wrap { max-width:700px;margin:28px auto;padding:0 20px; }
.search-row { display:flex;gap:10px; }
.search-input {
  flex:1;background:var(--surface);border:2px solid var(--border);border-radius:12px;
  padding:13px 18px;color:var(--text);font-family:'Cairo',sans-serif;font-size:16px;direction:rtl;
  transition:border-color .2s;
}
.search-input:focus{outline:none;border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.btn {
  background:var(--accent);color:#111;border:none;border-radius:12px;
  padding:13px 26px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity .2s;white-space:nowrap;
}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* STATUS */
.status { max-width:1200px;margin:0 auto 12px;padding:0 20px;color:var(--muted);font-size:14px;display:flex;align-items:center;gap:8px; }
.spinner { width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:none; }
.spinner.on{display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TABLE WRAPPER */
.table-wrap { max-width:1200px;margin:0 auto;padding:0 20px 40px;overflow-x:auto; }

table {
  width:100%;border-collapse:collapse;font-size:14px;
  background:var(--surface);border-radius:14px;overflow:hidden;
}
thead tr { background:var(--card);border-bottom:2px solid var(--border); }
thead th {
  padding:13px 14px;text-align:right;font-weight:700;color:var(--accent);
  white-space:nowrap;font-size:13px;
}
tbody tr {
  border-bottom:1px solid var(--border);
  transition:background .15s;cursor:pointer;
}
tbody tr:hover{background:var(--card);}
tbody tr:last-child{border-bottom:none;}
td { padding:11px 14px;vertical-align:middle; }

.td-img { width:80px; }
.td-img img { width:76px;height:54px;object-fit:cover;border-radius:7px;background:var(--bg); }
.td-img .no-img { width:76px;height:54px;background:var(--card);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:22px; }

.td-title { min-width:160px;max-width:220px; }
.title-text { font-weight:700;font-size:13px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }

.price-cell { font-weight:900;font-size:15px;color:var(--accent);white-space:nowrap; }

.badge {
  display:inline-block;padding:2px 9px;border-radius:5px;font-size:12px;font-weight:600;
  background:var(--card);border:1px solid var(--border);color:var(--text);
}
.badge.original { background:#1a2e20;border-color:#2a5030;color:var(--green); }
.badge.resprayed { background:#2e1a1a;border-color:#5a2a2a;color:var(--red); }
.badge.unknown { color:var(--muted); }

.empty { text-align:center;color:var(--muted);padding:60px 20px;font-size:15px; }
.empty .ico { font-size:48px;margin-bottom:14px; }

.err-box { background:#2a1515;border:1px solid #5a2020;border-radius:10px;padding:12px 16px;color:var(--red);font-size:13px;margin:0 20px 16px;max-width:1200px;margin:0 auto 16px; }
.debug-box { background:#151a2a;border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--muted);font-size:11px;direction:ltr;font-family:monospace;white-space:pre-wrap;margin:0 20px 16px;max-width:1200px; }

@media(max-width:600px){
  thead th:nth-child(5),
  td:nth-child(5),
  thead th:nth-child(7),
  td:nth-child(7){ display:none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🚗</div>
  <div>
    <h1>مقارنة سيارات الكويت</h1>
    <span>البحث في 4Sale — أفراد فقط</span>
  </div>
</header>

<div class="search-wrap">
  <div class="search-row">
    <input class="search-input" id="q" type="text" placeholder="مثال: كامري 2020، لاندكروزر، باترول ..."/>
    <button class="btn" id="btn" onclick="doSearch()">🔍 بحث</button>
  </div>
</div>

<div class="status" id="status" style="display:none">
  <div class="spinner" id="spin"></div>
  <span id="status-txt"></span>
</div>

<div id="msg-area" style="padding:0 20px;max-width:1200px;margin:0 auto;"></div>

<div class="table-wrap" id="table-wrap" style="display:none">
  <table id="tbl">
    <thead>
      <tr>
        <th>الصورة</th>
        <th>الموديل</th>
        <th>السعر</th>
        <th>السنة</th>
        <th>اللون</th>
        <th>صبغ الوكالة</th>
        <th>الكيلومترات</th>
        <th>الحالة</th>
        <th>المنطقة</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
document.getElementById('q').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

function setStatus(msg, loading=false) {
  const s = document.getElementById('status');
  s.style.display = msg ? 'flex' : 'none';
  document.getElementById('status-txt').textContent = msg;
  document.getElementById('spin').classList.toggle('on', loading);
}

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) { document.getElementById('q').focus(); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  setStatus('جاري البحث في 4Sale...', true);
  document.getElementById('msg-area').innerHTML = '';
  document.getElementById('table-wrap').style.display = 'none';
  document.getElementById('tbody').innerHTML = '';

  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if (data.error) {
      document.getElementById('msg-area').innerHTML = `<div class="err-box">⚠️ ${data.error}</div>`;
      setStatus('');
      return;
    }

    if (data.debug) {
      document.getElementById('msg-area').innerHTML =
        `<div class="debug-box">🔧 Debug:\n${JSON.stringify(data.debug, null, 2)}</div>`;
      setStatus('لا توجد نتائج — Debug أدناه');
      return;
    }

    const results = data.results || [];
    if (results.length === 0) {
      document.getElementById('msg-area').innerHTML =
        `<div class="empty"><div class="ico">🔍</div>لا توجد نتائج لـ "${q}"</div>`;
      setStatus('');
      return;
    }

    setStatus(`${results.length} إعلان`);
    document.getElementById('table-wrap').style.display = 'block';
    const tbody = document.getElementById('tbody');

    results.forEach((car, i) => {
      const tr = document.createElement('tr');
      tr.onclick = () => window.open(car.url, '_blank');
      tr.style.animationDelay = `${i*0.03}s`;

      // صبغ الوكالة badge
      const paint = car.original_paint;
      let paintBadge = '';
      if (paint === '—' || !paint) {
        paintBadge = `<span class="badge unknown">—</span>`;
      } else if (/نعم|وكالة|original|yes/i.test(paint)) {
        paintBadge = `<span class="badge original">✅ وكالة</span>`;
      } else if (/لا|مصبوغ|respray|no/i.test(paint)) {
        paintBadge = `<span class="badge resprayed">🔴 مصبوغ</span>`;
      } else {
        paintBadge = `<span class="badge">${paint}</span>`;
      }

      const km = car.km !== '—' ? Number(String(car.km).replace(/[^0-9]/g,'')).toLocaleString('ar-KW') + ' كم' : '—';

      tr.innerHTML = `
        <td class="td-img">
          ${car.image
            ? `<img src="${car.image}" onerror="this.parentElement.innerHTML='<div class=no-img>🚗</div>'" loading="lazy"/>`
            : `<div class="no-img">🚗</div>`}
        </td>
        <td class="td-title"><div class="title-text">${car.title || '—'}</div></td>
        <td class="price-cell">${car.price_text}</td>
        <td>${car.year}</td>
        <td>${car.color}</td>
        <td>${paintBadge}</td>
        <td>${km}</td>
        <td>${car.condition}</td>
        <td>${car.location}</td>`;
      tbody.appendChild(tr);
    });

  } catch(e) {
    document.getElementById('msg-area').innerHTML = `<div class="err-box">⚠️ ${e.message}</div>`;
    setStatus('');
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
