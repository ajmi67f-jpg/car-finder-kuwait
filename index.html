<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحث سيارات الكويت — أفراد فقط</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --card: #1e2330;
    --border: #2a3045;
    --accent: #e8b84b;
    --accent2: #f0c96a;
    --text: #eef0f6;
    --muted: #8892a4;
    --green: #3ecf8e;
    --red: #f76e6e;
    --blue: #5b9bd5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-icon { width: 42px; height: 42px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .logo-text h1 { font-size: 20px; font-weight: 900; }
  .logo-text span { font-size: 12px; color: var(--muted); }
  .source-badges { margin-right: auto; display: flex; gap: 8px; }
  .sbadge {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    border: 1px solid;
  }
  .sbadge.forsale { background: #1e2d1e; color: var(--green); border-color: #2a4a2a; }
  .sbadge.q8car   { background: #1e252d; color: var(--blue);  border-color: #2a3a4a; }

  /* SEARCH */
  .search-section { padding: 28px 24px 20px; max-width: 960px; margin: 0 auto; }
  .search-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .search-input {
    flex: 1; background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
    padding: 13px 18px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 16px;
    transition: border-color 0.2s; direction: rtl;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .btn-search {
    background: var(--accent); color: #0d0f14; border: none; border-radius: 12px;
    padding: 13px 26px; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  .btn-search:hover { background: var(--accent2); }
  .btn-search:active { transform: scale(0.98); }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }
  .filters-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 14px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px;
    direction: rtl; width: 170px;
  }
  .filter-input:focus { outline: none; border-color: var(--accent); }
  .filter-input::placeholder { color: var(--muted); }

  /* COLUMNS */
  .columns-wrap {
    max-width: 960px; margin: 0 auto; padding: 0 24px 40px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }

  .col-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: 12px; margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .col-header.forsale { background: #131f13; border-color: #2a4a2a; }
  .col-header.q8car   { background: #131825; border-color: #2a3a4a; }
  .col-title { font-size: 15px; font-weight: 700; }
  .col-count { margin-right: auto; font-size: 13px; color: var(--muted); }
  .col-spinner {
    width: 15px; height: 15px; border: 2px solid var(--border);
    border-radius: 50%; display: none;
  }
  .col-spinner.forsale { border-top-color: var(--green); animation: spin 0.7s linear infinite; }
  .col-spinner.q8car   { border-top-color: var(--blue);  animation: spin 0.7s linear infinite; }
  .col-spinner.active  { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CARD */
  .car-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; display: block; text-decoration: none; color: inherit;
    margin-bottom: 12px; transition: transform 0.18s, border-color 0.18s;
    animation: fadeUp 0.3s ease both;
  }
  .car-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .card-img {
    width: 100%; height: 160px; background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; color: var(--muted); overflow: hidden;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 12px 14px; }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-price { font-size: 18px; font-weight: 900; color: var(--accent); margin-bottom: 8px; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .meta-tag { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 2px 8px; font-size: 11px; color: var(--muted); }
  .badge-deal { background: #1e3a28; color: var(--green); border-color: #2a5038; font-weight: 700; }

  /* EMPTY / ERROR / DEBUG */
  .col-empty { text-align: center; color: var(--muted); padding: 30px 10px; font-size: 14px; }
  .col-empty .icon { font-size: 36px; margin-bottom: 10px; }
  .err-box { background: #2a1515; border: 1px solid #4a2020; border-radius: 8px; padding: 10px 12px; color: var(--red); font-size: 12px; margin-bottom: 10px; }
  .debug-box { background: #151a2a; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 11px; color: var(--muted); direction: ltr; font-family: monospace; white-space: pre-wrap; margin-bottom: 10px; }

  @media (max-width: 680px) {
    .columns-wrap { grid-template-columns: 1fr; }
    .search-row { flex-direction: column; }
    .source-badges { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🚗</div>
  <div class="logo-text">
    <h1>سيارات الكويت</h1>
    <span>من أفراد فقط</span>
  </div>
  <div class="source-badges">
    <span class="sbadge forsale">✅ 4Sale</span>
    <span class="sbadge q8car">🔵 Q8Car</span>
  </div>
</header>

<div class="search-section">
  <div class="search-row">
    <input class="search-input" id="q" type="text" placeholder="مثال: تويوتا كامري 2020 ..." />
    <button class="btn-search" id="btn" onclick="doSearch()">🔍 بحث</button>
  </div>
  <div class="filters-row">
    <input class="filter-input" id="min_price" type="number" placeholder="السعر الأدنى (د.ك)" />
    <input class="filter-input" id="max_price" type="number" placeholder="السعر الأقصى (د.ك)" />
  </div>
</div>

<div class="columns-wrap">
  <!-- 4Sale column -->
  <div id="col-forsale">
    <div class="col-header forsale">
      <span style="font-size:18px">🟢</span>
      <span class="col-title">4Sale</span>
      <span class="col-count" id="count-forsale"></span>
      <div class="col-spinner forsale" id="spin-forsale"></div>
    </div>
    <div id="list-forsale">
      <div class="col-empty"><div class="icon">🔍</div>ابدأ البحث</div>
    </div>
  </div>

  <!-- Q8Car column -->
  <div id="col-q8car">
    <div class="col-header q8car">
      <span style="font-size:18px">🔵</span>
      <span class="col-title">Q8Car</span>
      <span class="col-count" id="count-q8car"></span>
      <div class="col-spinner q8car" id="spin-q8car"></div>
    </div>
    <div id="list-q8car">
      <div class="col-empty"><div class="icon">🔍</div>ابدأ البحث</div>
    </div>
  </div>
</div>

<script>
  document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function setLoading(source, on) {
    document.getElementById(`spin-${source}`).classList.toggle('active', on);
  }
  function setCount(source, n) {
    document.getElementById(`count-${source}`).textContent = n !== null ? `${n} إعلان` : '';
  }

  async function doSearch() {
    const q = document.getElementById('q').value.trim();
    if (!q) { document.getElementById('q').focus(); return; }

    const min_price = document.getElementById('min_price').value;
    const max_price = document.getElementById('max_price').value;
    const btn = document.getElementById('btn');
    btn.disabled = true;

    // Reset both columns
    ['forsale', 'q8car'].forEach(src => {
      document.getElementById(`list-${src}`).innerHTML = '';
      setLoading(src, true);
      setCount(src, null);
    });

    try {
      const params = new URLSearchParams({ q });
      if (min_price) params.append('min_price', min_price);
      if (max_price) params.append('max_price', max_price);

      const res = await fetch(`/api/search?${params}`);
      const data = await res.json();

      // Render each source
      renderSource('forsale', data.results?.forsale);
      renderSource('q8car',   data.results?.q8car);

    } catch (err) {
      ['forsale', 'q8car'].forEach(src => {
        document.getElementById(`list-${src}`).innerHTML =
          `<div class="err-box">⚠️ ${err.message}</div>`;
        setLoading(src, false);
      });
    } finally {
      btn.disabled = false;
    }
  }

  function renderSource(src, data) {
    const container = document.getElementById(`list-${src}`);
    setLoading(src, false);

    if (!data) {
      container.innerHTML = `<div class="col-empty"><div class="icon">⚠️</div>لا توجد بيانات</div>`;
      return;
    }

    if (data.error) {
      container.innerHTML = `<div class="err-box">⚠️ ${data.error}</div>`;
      setCount(src, 0);
      return;
    }

    if (data.debug) {
      container.innerHTML = `<div class="debug-box">🔧 Debug — ${data.source}:\n${JSON.stringify(data.debug, null, 2)}</div>`;
      setCount(src, 0);
      return;
    }

    const listings = data.listings || [];
    setCount(src, listings.length);

    if (listings.length === 0) {
      container.innerHTML = `<div class="col-empty"><div class="icon">🔍</div>لا توجد نتائج</div>`;
      return;
    }

    // Deal detection
    const prices = listings.filter(r => r.price > 0).map(r => r.price);
    const avg = prices.length ? prices.reduce((a, b) => a + b, 0) / prices.length : 0;

    listings.forEach((car, i) => {
      const isDeal = avg > 0 && car.price > 0 && car.price < avg * 0.85;
      const card = document.createElement('a');
      card.className = 'car-card';
      card.href = car.url;
      card.target = '_blank';
      card.style.animationDelay = `${i * 0.04}s`;

      const imgHtml = car.image
        ? `<div class="card-img"><img src="${car.image}" alt="" onerror="this.parentElement.innerHTML='🚗'" loading="lazy"/></div>`
        : `<div class="card-img">🚗</div>`;

      const tags = [
        car.year     ? `<span class="meta-tag">📅 ${car.year}</span>` : '',
        car.km       ? `<span class="meta-tag">🛣 ${Number(car.km).toLocaleString('ar-KW')} كم</span>` : '',
        car.location ? `<span class="meta-tag">📍 ${car.location}</span>` : '',
        isDeal       ? `<span class="meta-tag badge-deal">✅ فرصة</span>` : '',
      ].filter(Boolean).join('');

      card.innerHTML = `
        ${imgHtml}
        <div class="card-body">
          <div class="card-title">${car.title || 'بدون عنوان'}</div>
          <div class="card-price">${car.price_text}</div>
          <div class="card-meta">${tags}</div>
        </div>`;
      container.appendChild(card);
    });
  }
</script>
</body>
</html>
